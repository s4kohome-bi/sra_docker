<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">    
    <title>Receipts</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
   
</head>
<body>

<h2>Receipt List</h2>

<div class="table-responsive">

    <table class="table" border="1" cellpadding="10">

        <tr>
            <th>ID</th>
            <th>Store</th>
            <th>Invoice</th>
            <th>Date</th>
            <th>Amount</th>
            <th>上傳者</th>
            <th>Source</th>
            <th>Category</th>
            <th>Created at</th>           
        </tr>

        {% for row in receipts %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>{{ row[5] }}</td>
            <td>{{ row[6] }}</td>
            <td>{{ row[7] }}</td>
            <td>{{ row[8] }}</td>
        </tr>
        {% endfor %}

    </table>
</div>
<br>
<a href="/">Back</a>
</body>
</html>
